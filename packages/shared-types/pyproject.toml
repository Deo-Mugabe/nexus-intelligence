[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nexus-types"
version = "0.1.0"
description = "Shared standard schemas for Nexus Intelligence services"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nexus_types"]
